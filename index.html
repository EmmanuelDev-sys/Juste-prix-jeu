<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juste Prix - Emma</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎯 Juste Prix</h1>
    <p>Devine le nombre secret entre <strong>1 et 100</strong></p>
    
    <input type="number" id="guess" placeholder="Ton chiffre ici" min="1" max="100">
    <button onclick="checkGuess()">Essayer</button>
    
    <p id="result" class="result"></p>
    <p id="attempts">Tentatives : 0</p>
    
    <button onclick="resetGame()" class="reset">Nouvelle partie</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
